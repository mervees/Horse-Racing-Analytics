# Horse Race Formula Lab — central configuration
# These mirror the arguments to src.pipeline.run_pipeline and can be loaded
# by scripts/run_pipeline.py via --config config/config.yaml.

data:
  raw_dir: data/raw          # drop real races.csv + runs.csv here
  allow_synthetic: true      # if no real CSVs found, generate synthetic data
  # Synthetic generator knobs (only used when falling back to synthetic data)
  synthetic:
    n_races: 1500
    n_horses: 1800
    n_jockeys: 60
    n_trainers: 90
    start_date: "2015-09-01"
    seed: 7

model:
  objective: ranking         # "ranking" (LambdaRank) or "classification"
  include_market: false      # keep market odds OUT of features (value-hunting)

probability:
  devig_method: multiplicative   # multiplicative | power | shin
  kelly_fraction_mult: 0.25      # fraction of full Kelly to stake (safety)

backtest:
  train_frac: 0.7            # chronological split: first 70% train, last 30% test
  edge_threshold: 0.05       # minimum model edge to place a "value" bet
  flat_stake: 1.0
  bankroll: 1000.0

llm:
  model: claude-sonnet-4-6   # used only if ANTHROPIC_API_KEY is set
  enable: true               # if false (or no key), uses deterministic templates
  rag_max_races: 500         # how many race "cards" to index for retrieval
